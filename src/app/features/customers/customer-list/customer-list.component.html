<div class="row">
  <div class="col-md-4">
    <app-customer-form></app-customer-form>
  </div>

  <div class="col-md-8">
    <div class="card">
      <div class="card-header bg-primary text-white">Customers List</div>
      <div class="card-body">
        <table class="table table-striped">
          <thead>
          <tr>
            <th>Name</th><th>Email</th><th>Actions</th>
          </tr>
          </thead>
          <tbody>
            @for (customer of customers$ | async; track customer.id) {
              <tr>
                <td>{{ customer.name }}</td>
                <td>{{ customer.email }}</td>
                <td>
                  <button class="btn btn-sm btn-warning me-2" (click)="onEdit(customer)">Edit</button>
                  <button class="btn btn-sm btn-danger" (click)="onDelete(customer.id)">Delete</button>
                </td>
              </tr>
            } @empty {
              <tr><td colspan="3" class="text-center">No customers yet</td></tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
