<div class="card">
  <h2>Grades Form</h2>

  <form>
    <div class="form-group">
      <label for="student">Student</label>
      <select id="student">
        <option value="">Select a student</option>
        <option value="1">Alice Johnson</option>
        <option value="2">Carol Lee</option>
      </select>
    </div>

    <div class="form-group">
      <label for="subject">Subject</label>
      <select id="subject">
        <option value="">Select a subject</option>
        <option value="1">Mathematics</option>
        <option value="2">Physics</option>
      </select>
    </div>

    <div class="form-group">
      <label for="score">Score</label>
      <input type="number" id="score" placeholder="0" min="0" max="10">
    </div>

    <div class="actions">
      <button type="button" class="btn-primary">Add</button>
      <button type="button" class="btn-secondary">Clear</button>
    </div>
  </form>
</div>
