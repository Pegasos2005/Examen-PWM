<div class="row">
  <div class="col-md-4">
    <app-teacher-form></app-teacher-form>
  </div>
  <div class="col-md-8">
    <div class="card">
      <div class="card-header bg-primary text-white">Teachers List</div>
      <div class="card-body">
        <table class="table table-striped">
          <thead>
          <tr><th>Name</th><th>Department</th><th>Actions</th></tr>
          </thead>
          <tbody>
            @for (teacher of teachers$ | async; track teacher.id) {
              <tr>
                <td>{{ teacher.name }}</td>
                <td>{{ teacher.department }}</td>
                <td>
                  <button class="btn btn-sm btn-warning me-2" (click)="onEdit(teacher)">Edit</button>
                  <button class="btn btn-sm btn-danger" (click)="onDelete(teacher.id)">Delete</button>
                </td>
              </tr>
            } @empty {
              <tr><td colspan="3" class="text-center">No teachers yet</td></tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
