<div class="card">
  <div class="card-header bg-secondary text-white">
    {{ editingId ? 'Edit Teacher' : 'Add Teacher' }}
  </div>
  <div class="card-body">
    <form [formGroup]="teacherForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" formControlName="name">
      </div>
      <div class="mb-3">
        <label class="form-label">Department</label>
        <input type="text" class="form-control" formControlName="department">
      </div>
      <button type="submit" class="btn btn-success me-2" [disabled]="teacherForm.invalid">
        {{ editingId ? 'Update' : 'Add' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="onClear()">Clear</button>
    </form>
  </div>
</div>
