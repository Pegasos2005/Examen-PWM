<div class="card">
  <h2>Subjects Form</h2>

  <form>
    <div class="form-group">
      <label for="name">Subject Name</label>
      <input type="text" id="name" placeholder="Enter subject name">
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <input type="text" id="description" placeholder="Enter subject description">
    </div>

    <div class="actions">
      <button type="button" class="btn-primary">Add</button>
      <button type="button" class="btn-secondary">Clear</button>
    </div>
  </form>
</div>
