<div class="card">
  <div class="card-header bg-secondary text-white">
    {{ editingId ? 'Edit Assignment' : 'Add Assignment' }}
  </div>
  <div class="card-body">
    <form [formGroup]="assignmentForm" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label class="form-label">Teacher</label>
        <select class="form-select" formControlName="teacherId">
          <option value="">Select teacher</option>
          @for (teacher of teachers; track teacher.id) {
            <option [value]="teacher.id">{{ teacher.name }}</option>
          }
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Course</label>
        <select class="form-select" formControlName="courseId">
          <option value="">Select course</option>
          @for (course of courses; track course.id) {
            <option [value]="course.id">{{ course.title }}</option>
          }
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Semester</label>
        <input type="text" class="form-control" formControlName="semester">
      </div>

      <button type="submit" class="btn btn-success me-2" [disabled]="assignmentForm.invalid">
        {{ editingId ? 'Update' : 'Add' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="onClear()">Clear</button>
    </form>
  </div>
</div>
