<div class="row">
  <div class="col-md-4">
    <app-assignment-form></app-assignment-form>
  </div>
  <div class="col-md-8">
    <div class="card">
      <div class="card-header bg-primary text-white">Assignments List</div>
      <div class="card-body">
        <table class="table table-striped">
          <thead>
          <tr><th>Teacher</th><th>Course</th><th>Semester</th><th>Actions</th></tr>
          </thead>
          <tbody>
            @for (assignment of assignments; track assignment.id) {
              <tr>
                <td>{{ getTeacherName(assignment.teacherId) }}</td>
                <td>{{ getCourseTitle(assignment.courseId) }}</td>
                <td>{{ assignment.semester }}</td>
                <td>
                  <button class="btn btn-sm btn-warning me-2" (click)="onEdit(assignment)">Edit</button>
                  <button class="btn btn-sm btn-danger" (click)="onDelete(assignment.id)">Delete</button>
                </td>
              </tr>
            } @empty {
              <tr><td colspan="4" class="text-center">No assignments yet</td></tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
