<div class="card">
  <div class="card-header bg-secondary text-white">
    {{ editingId ? 'Edit Order' : 'Add Order' }}
  </div>
  <div class="card-body">
    <form [formGroup]="orderForm" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label class="form-label">Customer</label>
        <select class="form-select" formControlName="customerId">
          <option value="">Select customer</option>
          @for (customer of customers; track customer.id) {
            <option [value]="customer.id">{{ customer.name }}</option>
          }
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Product</label>
        <select class="form-select" formControlName="productId">
          <option value="">Select product</option>
          @for (product of products; track product.id) {
            <option [value]="product.id">{{ product.name }}</option>
          }
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Quantity</label>
        <input type="number" class="form-control" formControlName="quantity" min="1">
      </div>

      <button type="submit" class="btn btn-success me-2" [disabled]="orderForm.invalid">
        {{ editingId ? 'Update' : 'Add' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="onClear()">Clear</button>
    </form>
  </div>
</div>
