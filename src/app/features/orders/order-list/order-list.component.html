<div class="row">
  <div class="col-md-4">
    <app-order-form></app-order-form>
  </div>
  <div class="col-md-8">
    <div class="card">
      <div class="card-header bg-primary text-white">Orders List</div>
      <div class="card-body">
        <table class="table table-striped">
          <thead>
          <tr><th>Customer</th><th>Product</th><th>Quantity</th><th>Actions</th></tr>
          </thead>
          <tbody>
            @for (order of orders; track order.id) {
              <tr>
                <td>{{ getCustomerName(order.customerId) }}</td>
                <td>{{ getProductName(order.productId) }}</td>
                <td>{{ order.quantity }}</td>
                <td>
                  <button class="btn btn-sm btn-warning me-2" (click)="onEdit(order)">Edit</button>
                  <button class="btn btn-sm btn-danger" (click)="onDelete(order.id)">Delete</button>
                </td>
              </tr>
            } @empty {
              <tr><td colspan="4" class="text-center">No orders yet</td></tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
