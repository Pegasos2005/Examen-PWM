<div class="card">
  <h2>Students Form</h2>

  <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">

    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" formControlName="name" placeholder="Enter student name">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" placeholder="Enter student email">
    </div>

    <div class="actions">
      <button type="submit" class="btn-primary" [disabled]="studentForm.invalid">
        {{ editingId ? 'Update' : 'Add' }}
      </button>
      <button type="button" class="btn-secondary" (click)="onClear()">Clear</button>
    </div>

  </form>
</div>
